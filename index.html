const {useState,useEffect,useRef,useCallback,useMemo}=React;
const PDFJS_WORKER_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Math ──────────────────────────────────────────────────────────────────────
const MAX_RESULTS=500;
function computeTFromSums(oce,coeff,n,s,ss){
  if(n<=0)return NaN;
  const avg=s/n;
  const nppi=oce*coeff;
  const x=0.5*avg+0.2*oce+0.3*nppi;
  let v=(ss-2*x*s+n*x*x)/n;
  if(v<0&&v>-1e-9)v=0;
  if(v<0)return NaN;
  return x-Math.sqrt(v);
}
function computeT(oce,coeff,bidders){
  const n=bidders.length;if(n===0)return NaN;
  const s=bidders.reduce((a,b)=>a+b.value,0);
  const ss=bidders.reduce((a,b)=>a+b.value*b.value,0);
  return computeTFromSums(oce,coeff,n,s,ss);
}
function greedyTUpperBound(oce,coeff,curN,curS,curSS,candidateVals,need){
  if(need===0||!candidateVals.length)return computeTFromSums(oce,coeff,curN,curS,curSS);
  const t0=computeTFromSums(oce,coeff,curN,curS,curSS);
  if(!isFinite(t0))return t0;
  const scored=candidateVals.map(v=>{
    const tw=computeTFromSums(oce,coeff,curN-1,curS-v,curSS-v*v);
    return[(isFinite(tw)?tw-t0:0),v];
  });
  scored.sort((a,b)=>(b[0]-a[0])||(b[1]-a[1]));
  let cn=curN,cs=curS,css=curSS;
  for(let i=0;i<Math.min(need,scored.length);i++){
    const v=scored[i][1];
    cn-=1;cs-=v;css-=v*v;
  }
  return computeTFromSums(oce,coeff,cn,cs,css);
}
function findWinner(bidders,T){
  const above=bidders.filter(b=>b.value>T);
  if(!above.length)return null;
  return above.reduce((a,b)=>a.value<b.value?a:b);
}
function analyzeExclusions(oce,coeffMin,coeffMax,allBidders,targetId,maxResults=MAX_RESULTS){
  const targetAll=allBidders.find(b=>b.id===targetId)||null;
  const empty={results:[],fullT:NaN,fullWinner:null,isAlreadyWinner:false,truncated:false,foundMin:null,error:null,coeffMin,coeffMax};
  if(!(oce>0))return{...empty,error:'OCE must be > 0.'};
  if(coeffMin>coeffMax)return{...empty,error:'Min NPPI must be <= Max NPPI.'};
  const limit=1.1*oce;
  const elig=allBidders.filter(b=>b.value<=limit);
  if(!elig.length)return{...empty,error:'No bids <= 110% of OCE; nothing can be computed.'};
  if(!targetAll)return{...empty,error:'Target bidder not found.'};
  if(targetAll.value>limit)return{...empty,error:'Target bid is > 110% of OCE, so it can never be the first above T.'};
  const targetIdx=elig.findIndex(b=>b.id===targetId);
  if(targetIdx<0)return{...empty,error:'Target bidder is not eligible for calculation.'};

  const targetBid=elig[targetIdx].value;
  const m=elig.length;
  const values=elig.map(b=>b.value);
  const fullN=m;
  const fullS=values.reduce((a,b)=>a+b,0);
  const fullSS=values.reduce((a,b)=>a+b*b,0);
  const belowTargetIndices=[];
  for(let i=0;i<m;i++)if(i!==targetIdx&&values[i]<targetBid)belowTargetIndices.push(i);
  const belowTargetSortedDesc=belowTargetIndices.slice().sort((a,b)=>(values[b]-values[a])||(a-b));

  let others=[];
  for(let i=0;i<m;i++)if(i!==targetIdx)others.push(i);

  const coeffMid=0.5*(coeffMin+coeffMax);
  const fullT=computeTFromSums(oce,coeffMid,fullN,fullS,fullSS);
  const fullWinner=isFinite(fullT)?findWinner(elig,fullT):null;
  const deltaByIdx={};
  if(isFinite(fullT)){
    for(const i of others){
      const v=values[i];
      const two=computeTFromSums(oce,coeffMid,fullN-1,fullS-v,fullSS-v*v);
      deltaByIdx[i]=isFinite(two)?two-fullT:0;
    }
  }else{
    for(const i of others)deltaByIdx[i]=0;
  }

  const needsLowerT=!isFinite(fullT)||fullT>=targetBid;
  others=others.slice().sort((a,b)=>{
    if(needsLowerT)return(deltaByIdx[a]-deltaByIdx[b])||(values[b]-values[a])||(a-b);
    return(deltaByIdx[b]-deltaByIdx[a])||(values[a]-values[b])||(a-b);
  });

  function searchKSequential(k){
    const excludedFlags=Array(m).fill(false);
    const excl=[];
    const matches=[];
    let truncated=false;

    function recChooseExcluded(start,need,exclS,exclSS){
      if(matches.length>=maxResults){truncated=true;return;}
      const nInc=fullN-excl.length;
      const curS=fullS-exclS;
      const curSS=fullSS-exclSS;

      if(need===0){
        let maxBelow=-Infinity;
        for(const i of belowTargetSortedDesc){
          if(!excludedFlags[i]){maxBelow=values[i];break;}
        }
        const tAtMin=computeTFromSums(oce,coeffMin,nInc,curS,curSS);
        if(!isFinite(tAtMin)||!(tAtMin<targetBid))return;
        const tAtMax=computeTFromSums(oce,coeffMax,nInc,curS,curSS);
        if(!isFinite(tAtMax)||maxBelow>tAtMax)return;
        matches.push({
          excluded:excl.map(i=>elig[i].id),
          excludedNames:excl.map(i=>elig[i].name),
          k,
          tAtMin,
          tAtMax,
        });
        return;
      }

      const remaining=others.length-start;
      if(remaining<need)return;

      const remainingBelow=belowTargetSortedDesc.filter(i=>!excludedFlags[i]);
      let minPossibleMaxBelow=-Infinity;
      if(remainingBelow.length>need)minPossibleMaxBelow=values[remainingBelow[need]];

      if(minPossibleMaxBelow>-Infinity){
        const candidateVals=[];
        for(let j=start;j<others.length;j++)candidateVals.push(values[others[j]]);
        const tUb=greedyTUpperBound(oce,coeffMax,nInc,curS,curSS,candidateVals,need);
        if(isFinite(tUb)&&tUb<minPossibleMaxBelow)return;
      }

      for(let j=start;j<others.length;j++){
        if(matches.length>=maxResults){truncated=true;return;}
        const i=others[j];
        excludedFlags[i]=true;
        excl.push(i);
        const v=values[i];
        recChooseExcluded(j+1,need-1,exclS+v,exclSS+v*v);
        excl.pop();
        excludedFlags[i]=false;
      }
    }

    recChooseExcluded(0,k,0,0);
    return{matches,truncated};
  }

  let foundMin=null;
  let results=[];
  let truncated=false;
  for(let k=0;k<=others.length;k++){
    const res=searchKSequential(k);
    if(res.matches.length){
      foundMin=k;
      results=res.matches;
      truncated=res.truncated;
      break;
    }
  }

  if(foundMin===null){
    return{...empty,fullT,fullWinner,error:"No subset makes the selected target 'first above T'. Try different parameters."};
  }

  return{
    results,
    fullT,
    fullWinner,
    isAlreadyWinner:foundMin===0,
    truncated,
    foundMin,
    error:null,
    coeffMin,
    coeffMax,
  };
}

// ── Adaptive ring layout ──────────────────────────────────────────────────────
function computeLayout(bidders,targetId,CX,CY,maxRadius,innerReserved,scale=1){
  const nodes=targetId?bidders.filter(b=>b.id!==targetId):bidders;
  if(!nodes.length)return{positions:{},rings:[]};
  const gap=Math.max(8,Math.round(10*scale));
  const maxNodeR=Math.max(Math.round(14*scale),Math.min(Math.round(34*scale),Math.floor((maxRadius-innerReserved)/2)));
  const minNodeR=Math.max(8,Math.round(9*scale));
  let rings=null;

  for(let nodeR=maxNodeR;nodeR>=minNodeR;nodeR--){
    const radialStep=2*nodeR+gap;
    const firstRadius=innerReserved+nodeR+gap;
    const maxRingRadius=maxRadius-nodeR;
    if(firstRadius>maxRingRadius)continue;
    const trial=[];let radius=firstRadius,remaining=nodes.length;
    while(radius<=maxRingRadius+0.01&&remaining>0){
      const capacity=Math.max(4,Math.floor((2*Math.PI*radius)/(2*nodeR+gap)));
      const count=Math.min(remaining,capacity);
      trial.push({radius,nodeR,count});
      remaining-=count;
      radius+=radialStep;
    }
    if(remaining<=0){rings=trial;break;}
  }

  if(!rings){
    const nodeR=minNodeR;
    const radialStep=2*nodeR+Math.max(4,gap-2);
    const maxRingRadius=Math.max(innerReserved+nodeR+gap,maxRadius-nodeR);
    rings=[];let radius=innerReserved+nodeR+gap,remaining=nodes.length;
    while(remaining>0&&rings.length<10){
      const useRadius=Math.min(radius,maxRingRadius);
      const capacity=Math.max(4,Math.floor((2*Math.PI*useRadius)/(2*nodeR+Math.max(4,gap-2))));
      const count=Math.min(remaining,capacity);
      rings.push({radius:useRadius,nodeR,count});
      remaining-=count;
      radius+=radialStep;
    }
    if(remaining>0&&rings.length)rings[rings.length-1].count+=remaining;
  }

  const positions={};
  let offset=0;
  rings.forEach(ring=>{
    const slice=nodes.slice(offset,offset+ring.count);
    offset+=ring.count;
    const cnt=slice.length;
    slice.forEach((b,i)=>{
      const angle=(i/cnt)*2*Math.PI-Math.PI/2;
      positions[b.id]={x:CX+ring.radius*Math.cos(angle),y:CY+ring.radius*Math.sin(angle),r:ring.nodeR};
    });
  });
  return{positions,rings};
}

// ── Parsers ───────────────────────────────────────────────────────────────────
function parseCsvTxt(text){
  const rows=[],errors=[];
  text.split(/\r?\n/).forEach((line,i)=>{
    line=line.trim();if(!line||line.startsWith('#'))return;
    const sep=line.includes(',')? ',':line.includes('\t')? '\t':';';
    const parts=line.split(sep).map(p=>p.trim().replace(/^["']|["']$/g,''));
    if(parts.length<2){errors.push(`Line ${i+1}: need 2+ columns`);return;}
    let nameCol=0,valCol=1;
    if(/^\d+$/.test(parts[0])&&parts.length>=3){nameCol=1;valCol=parts.length-1;}
    const name=parts[nameCol];
    const amt=parseFloat(parts[valCol].replace(/,/g,''));
    if(!name||isNaN(amt)){errors.push(`Line ${i+1}: parse failed`);return;}
    rows.push({name,value:amt});
  });
  return{rows,errors};
}
const TOR2_SKIP_RE=/name of tenderer|quoted amount|s\.?\s*no|discount|without discount|with discount|percentage|\(\d\)/i;
const TOR2_ROW_START_RE=/^(\d{1,3})\s+(.+)$/;
const TOR2_NUM_TOKEN_RE=/\d[\d,]*\.\d+/;
const TOR2_NUMS_RE=/\d[\d,]*\.\d+/g;
function cleanTextPart(text){
  return String(text||'').replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim();
}
function isTor2Noise(line){
  return TOR2_SKIP_RE.test(line);
}
function parseTor2BidBlock(lines){
  const cleaned=lines.map(cleanTextPart).filter(line=>line&&!isTor2Noise(line));
  if(!cleaned.length)return null;
  const start=cleaned[0].match(TOR2_ROW_START_RE);
  if(!start)return null;
  const serial=start[1];
  let amount=NaN,dataIdx=-1,nameFromNumberLine='';
  for(let i=0;i<cleaned.length;i++){
    const src=i===0?cleaned[i].replace(/^\d{1,3}\s+/,''):cleaned[i];
    const nums=src.match(TOR2_NUMS_RE)||[];
    if(!nums.length)continue;
    amount=parseFloat(nums[nums.length-1].replace(/,/g,''));
    if(!isFinite(amount))continue;
    dataIdx=i;
    nameFromNumberLine=cleanTextPart(src.replace(/\s+\d[\d,]*\.\d+(?:\s+\d[\d,]*\.\d+)*\s*$/,''));
    break;
  }
  if(!isFinite(amount)||amount<=0)return null;
  const nameParts=[];
  if(nameFromNumberLine)nameParts.push(nameFromNumberLine);
  cleaned.forEach((line,i)=>{
    if(i===dataIdx)return;
    const text=cleanTextPart(line.replace(/^\d{1,3}\s+/,''));
    if(!text||TOR2_NUM_TOKEN_RE.test(text))return;
    nameParts.push(text);
  });
  const name=cleanTextPart(nameParts.join(' '));
  if(!name)return null;
  return{serial,name,value:amount};
}
function parseTor2Text(text){
  const lines=text.split(/\r?\n/).map(cleanTextPart).filter(Boolean);
  const bids=[],errors=[],seenSerials=new Set();let inHeader=false;
  const csvRe=/^(.+?),([\d.]+)$/;
  let current=[];
  function flushCurrent(){
    if(!current.length)return;
    const parsed=parseTor2BidBlock(current);
    current=[];
    if(!parsed||seenSerials.has(parsed.serial))return;
    seenSerials.add(parsed.serial);
    bids.push({name:parsed.name,value:parsed.value});
  }
  for(const line of lines){
    if(/opening report header/i.test(line)){flushCurrent();inHeader=true;continue;}
    if(/opening report footer/i.test(line)){flushCurrent();break;}
    const cm=line.match(csvRe);
    if(cm&&!isNaN(parseFloat(cm[2]))&&!inHeader){
      bids.push({name:cm[1].trim(),value:parseFloat(cm[2])});
      continue;
    }
    if(!inHeader)continue;
    if(isTor2Noise(line))continue;
    if(TOR2_ROW_START_RE.test(line)){flushCurrent();current=[line];continue;}
    if(current.length)current.push(line);
  }
  flushCurrent();
  if(!bids.length)errors.push('No bidder rows found. Paste text with "Opening Report Header".');
  return{bids,errors,tenderId:'',openingDate:''};
}
function pdfItemsToLines(items){
  const rows=[];
  items
    .map(item=>({text:cleanTextPart(item.str),x:item.transform?.[4]||0,y:item.transform?.[5]||0}))
    .filter(item=>item.text)
    .sort((a,b)=>Math.abs(b.y-a.y)>0.5?b.y-a.y:a.x-b.x)
    .forEach(item=>{
      let row=rows.find(r=>Math.abs(r.y-item.y)<=2.5);
      if(!row){rows.push({y:item.y,items:[item]});return;}
      row.items.push(item);
      row.y=(row.y*(row.items.length-1)+item.y)/row.items.length;
    });
  return rows
    .sort((a,b)=>b.y-a.y)
    .map(row=>cleanTextPart(row.items.sort((a,b)=>a.x-b.x).map(item=>item.text).join(' ')))
    .filter(Boolean);
}
async function extractTextFromPdf(file){
  if(!window.pdfjsLib)throw new Error('PDF parser library failed to load.');
  const data=new Uint8Array(await file.arrayBuffer());
  const pdf=await window.pdfjsLib.getDocument({data}).promise;
  const pages=[];
  for(let pageNo=1;pageNo<=pdf.numPages;pageNo++){
    const page=await pdf.getPage(pageNo);
    const text=await page.getTextContent();
    pages.push(pdfItemsToLines(text.items).join('\n'));
  }
  return pages.join('\n');
}

// ── Design ────────────────────────────────────────────────────────────────────
const C={bg:"#080d14",panel:"#0e1621",border:"#1a2d44",accent:"#00c8ff",accentDim:"#0077aa",
  gold:"#ffd166",red:"#ff4f6d",green:"#06d6a0",muted:"#3a5270",text:"#c8dff0",textDim:"#5a7a99"};
function uid(){return Math.random().toString(36).slice(2,8);}
const iSty={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid #1a2d44",
  borderRadius:6,color:"#c8dff0",padding:"8px 10px",fontSize:13,fontFamily:"'Courier New',monospace",
  boxSizing:"border-box",outline:"none",marginTop:4,WebkitAppearance:"none"};
function bSty(color,extra={}){
  return{background:`${color}22`,border:`1px solid ${color}66`,borderRadius:6,
    color,padding:"8px 12px",fontSize:12,fontFamily:"'Courier New',monospace",
    cursor:"pointer",WebkitAppearance:"none",...extra};
}

// ── SVG touch helpers ─────────────────────────────────────────────────────────
function svgPoint(svg,clientX,clientY){
  const pt=svg.createSVGPoint();
  pt.x=clientX;pt.y=clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

// ── Import Modal ──────────────────────────────────────────────────────────────
function ImportModal({onClose,onImport}){
  const [tab,setTab]=useState('csv');
  const [tor2,setTor2]=useState('');
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState('');
  const [pdfBusy,setPdfBusy]=useState(false);
  const fileRef=useRef(null);
  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const {rows,errors}=parseCsvTxt(ev.target.result);
      if(!rows.length){setErr(errors.join('\n')||'No valid rows.');setPreview(null);return;}
      setErr(errors.slice(0,3).join('\n'));setPreview({rows,source:f.name});
    };
    r.readAsText(f);
  }
  async function handlePdf(e){
    const f=e.target.files[0];if(!f)return;
    setPdfBusy(true);setErr('');setPreview(null);
    try{
      const text=await extractTextFromPdf(f);
      const{bids,errors}=parseTor2Text(text);
      if(!bids.length){setErr(errors.join('\n')||'No bidder rows found in PDF.');setPreview(null);return;}
      setErr(errors.join('\n'));setPreview({rows:bids,source:f.name});
    }catch(ex){
      setErr(ex?.message||'Could not parse the PDF file.');setPreview(null);
    }finally{
      setPdfBusy(false);
      e.target.value='';
    }
  }
  function handleTor2(){
    if(!tor2.trim()){setErr('Paste text first.');return;}
    const{bids,errors}=parseTor2Text(tor2);
    if(!bids.length){setErr(errors.join('\n'));setPreview(null);return;}
    setErr(errors.join('\n'));setPreview({rows:bids,source:'TOR2 text'});
  }
  function confirm(){if(!preview)return;onImport(preview);onClose();}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:2000,padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0e1621",border:`1px solid ${C.border}`,borderRadius:14,
        width:"100%",maxWidth:480,maxHeight:"88vh",display:"flex",flexDirection:"column",
        padding:18,gap:14,overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:C.accent,letterSpacing:2}}>IMPORT BIDDERS</span>
          <span onClick={onClose} style={{cursor:"pointer",color:C.textDim,fontSize:22,lineHeight:1,padding:"0 4px"}}>✕</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          {['csv','tor2'].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setPreview(null);setErr('');}}
              style={bSty(tab===t?C.accent:C.muted,{flex:1,fontSize:12})}>
              {t==='csv'?'📂 CSV / TXT':'📄 TOR2 Text'}
            </button>
          ))}
        </div>
        {tab==='csv'&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:12,color:C.textDim,lineHeight:1.6}}>
              Select a <b style={{color:C.text}}>.csv</b> or <b style={{color:C.text}}>.txt</b> file.
              Format: <b style={{color:C.text}}>name, amount</b> per line.
            </div>
            <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFile}
              style={{...iSty,padding:"10px"}}/>
          </div>
        )}
        {tab==='tor2'&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:12,color:C.textDim,lineHeight:1.6}}>
              Open TOR2 PDF → Select All → Copy → Paste below.
            </div>
            <input type="file" accept=".pdf,application/pdf" onChange={handlePdf}
              style={{...iSty,padding:"10px"}}/>
            <div style={{fontSize:11,color:C.textDim,letterSpacing:1}}>
              OR PASTE COPIED TOR2 TEXT
            </div>
            <textarea value={tor2} onChange={e=>setTor2(e.target.value)}
              placeholder="Paste TOR2 PDF text here..."
              style={{...iSty,height:140,resize:"none",lineHeight:1.5}}/>
            <button onClick={handleTor2} style={bSty(C.accent,{alignSelf:"flex-start",padding:"8px 16px"})}>Parse →</button>
          </div>
        )}
        {err&&<div style={{fontSize:12,color:C.red,background:"rgba(255,79,109,0.08)",
          border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 12px",whiteSpace:"pre-wrap"}}>{err}</div>}
        {preview&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:11,color:C.textDim,letterSpacing:1}}>
              {preview.rows.length} BIDDERS FOUND
              {preview.source&&<span style={{marginLeft:10,color:C.gold}}>{preview.source}</span>}
            </div>
            <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
              {preview.rows.map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",
                  padding:"5px 10px",background:"rgba(255,255,255,0.02)",
                  border:`1px solid ${C.border}`,borderRadius:5,fontSize:12}}>
                  <span style={{color:C.text}}>{i+1}. {r.name}</span>
                  <span style={{color:C.accent}}>{r.value.toLocaleString()}</span>
                </div>
              ))}
            </div>
            <button onClick={confirm}
              style={bSty(C.green,{alignSelf:"stretch",padding:"10px",fontSize:14,fontWeight:700})}>
              ✓ Load {preview.rows.length} Bidders
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const containerRef=useRef(null);
  const svgRef=useRef(null);
  const [dims,setDims]=useState({W:360,H:360});

  // Responsive: measure container on mount + resize
  useEffect(()=>{
    function measure(){
      const el=containerRef.current;
      if(!el)return;
      const w=el.offsetWidth;
      setDims({W:w,H:Math.max(300,Math.min(w,480))});
    }
    measure();
    window.addEventListener('resize',measure);
    return()=>window.removeEventListener('resize',measure);
  },[]);

  const {W,H}=dims;
  const CX=W/2,CY=H/2;
  const scale=W/440; // normalise layout to a 440px reference

  const DEFAULT=[
    {id:"a",name:"Farjana Khan",    value:44109961},
    {id:"b",name:"Eunus & Bros",    value:48581634},
    {id:"c",name:"Liton Mollik",    value:49065525},
    {id:"d",name:"Amin & Co",       value:49528403},
    {id:"e",name:"J Enterprise",    value:49909604},
    {id:"f",name:"HM Construction", value:49983396},
    {id:"g",name:"MR Construction", value:50098830},
    {id:"h",name:"Techbay Intl",    value:50481396},
    {id:"i",name:"Lucky Enterprise",value:50644766},
  ];

  const [oce,setOce]               =useState(54456742);
  const [coeffMin,setCoeffMin]     =useState(0.90);
  const [coeffMax,setCoeffMax]     =useState(0.90);
  const [rawOce,setRawOce]         =useState("54456742");
  const [rawCoeffMin,setRawCoeffMin]=useState("0.90");
  const [rawCoeffMax,setRawCoeffMax]=useState("0.90");
  const [bidders,setBidders]   =useState(DEFAULT);
  const [targetId,setTargetId] =useState(null);
  const [analysis,setAnalysis] =useState(null);
  const [phase,setPhase]       =useState("idle");
  const [selectedCombo,setSelectedCombo]=useState(0);
  const [revealedExcl,setRevealedExcl]  =useState([]);
  const [dragging,setDragging] =useState(null);
  const [dragPos,setDragPos]   =useState({});
  const [dragOffset,setDragOffset]=useState({x:0,y:0});
  const [particles,setParticles]=useState([]);
  const [newName,setNewName]   =useState('');
  const [newVal,setNewVal]     =useState('');
  const [showAdd,setShowAdd]   =useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showPanel,setShowPanel]=useState('bidders'); // 'bidders' | 'results'
  const [importMeta,setImportMeta]=useState(null);
  const [pulse,setPulse]       =useState(false);
  const revealTimers=useRef([]);
  const availableRadius=Math.max(56,Math.min(CX,CY)-Math.round(16*scale));
  const dropR=Math.round(Math.max(30*scale,Math.min(55*scale,availableRadius*0.28)));
  const centerNodeR=Math.round(Math.max(22*scale,Math.min(40*scale,dropR*0.76)));
  const layoutData=useMemo(()=>{
    const pos={};
    if(targetId)pos[targetId]={x:CX,y:CY,r:centerNodeR};
    const{positions:layoutPositions,rings}=computeLayout(
      bidders,
      targetId,
      CX,
      CY,
      availableRadius,
      dropR+Math.round(8*scale),
      scale
    );
    return{positions:{...pos,...layoutPositions},rings};
  },[bidders.map(b=>b.id).join(','),targetId,CX,CY,availableRadius,dropR,centerNodeR,scale]);

  const positions=useMemo(()=>({...layoutData.positions,...dragPos}),[layoutData.positions,dragPos]);
  const bidderSerials=useMemo(
    ()=>Object.fromEntries(bidders.map((b,i)=>[b.id,i+1])),
    [bidders]
  );

  const currentExcluded=useMemo(()=>{
    if(phase!=='result'||!analysis?.results?.length)return[];
    return analysis.results[selectedCombo]?.excluded||[];
  },[analysis,selectedCombo,phase]);

  useEffect(()=>{
    revealTimers.current.forEach(clearTimeout);revealTimers.current=[];
    setRevealedExcl([]);
    if(phase==='result'&&currentExcluded.length>0){
      currentExcluded.forEach((eid,idx)=>{
        const t=setTimeout(()=>setRevealedExcl(p=>[...p,eid]),200+idx*350);
        revealTimers.current.push(t);
      });
    }
  },[currentExcluded.join(','),phase]);

  useEffect(()=>{if(targetId&&phase!=='idle')runAnalysis(targetId);},[oce,coeffMin,coeffMax]);

  // ── Pointer events (mouse + touch) ─────────────────────────────────────────
  function getClientXY(e){
    if(e.touches&&e.touches.length)return{cx:e.touches[0].clientX,cy:e.touches[0].clientY};
    if(e.changedTouches&&e.changedTouches.length)return{cx:e.changedTouches[0].clientX,cy:e.changedTouches[0].clientY};
    return{cx:e.clientX,cy:e.clientY};
  }
  function onDragStart(e,id){
    e.preventDefault();
    const {cx,cy}=getClientXY(e);
    const sp=svgPoint(svgRef.current,cx,cy);
    setDragging(id);
    const base=positions[id]||{x:CX,y:CY};
    setDragOffset({x:sp.x-base.x,y:sp.y-base.y});
  }
  function onDragMove(e){
    if(!dragging)return;
    const {cx,cy}=getClientXY(e);
    const sp=svgPoint(svgRef.current,cx,cy);
    const r=positions[dragging]?.r||28;
    setDragPos(prev=>({...prev,[dragging]:{...positions[dragging],
      x:Math.max(r+4,Math.min(W-r-4,sp.x-dragOffset.x)),
      y:Math.max(r+4,Math.min(H-r-4,sp.y-dragOffset.y))}}));
  }
  function onDragEnd(e){
    if(!dragging)return;
    const {cx,cy}=getClientXY(e);
    const sp=svgPoint(svgRef.current,cx,cy);
    const dist=Math.hypot((sp.x-dragOffset.x)-CX,(sp.y-dragOffset.y)-CY);
    const dropZone=Math.round(55*scale);
    const isTargetDrag=dragging===targetId;
    if(dist<dropZone){
      setDragPos(prev=>{const n={...prev};delete n[dragging];return n;});
      if(!isTargetDrag){
        setTargetId(dragging);
        spawnParticles(CX,CY);runAnalysis(dragging);
        setShowPanel('results');
      }
    }else{
      setDragPos(prev=>{const n={...prev};delete n[dragging];return n;});
      if(isTargetDrag){
        setTargetId(null);setAnalysis(null);setPhase('idle');setRevealedExcl([]);setSelectedCombo(0);
        setShowPanel('bidders');
      }
    }
    setDragging(null);
  }

  function spawnParticles(x,y){
    const ps=Array.from({length:16},(_,i)=>({id:uid(),x,y,angle:(i/16)*360,speed:2+Math.random()*3,size:2+Math.random()*2}));
    setParticles(ps);setTimeout(()=>setParticles([]),900);
  }
  function runAnalysis(tid){
    setPhase('analyzing');setRevealedExcl([]);setAnalysis(null);setSelectedCombo(0);
    setPulse(true);setTimeout(()=>setPulse(false),600);
    setTimeout(()=>{const r=analyzeExclusions(oce,coeffMin,coeffMax,bidders,tid);setAnalysis(r);setPhase('result');},600);
  }
  function handleImport({rows,tenderId,openingDate,source}){
    const nb=rows.map(r=>({id:uid(),name:r.name,value:r.value}));
    setBidders(nb);setTargetId(null);setAnalysis(null);setPhase('idle');
    setRevealedExcl([]);setDragPos({});setSelectedCombo(0);
    setImportMeta(tenderId||openingDate?{tenderId,openingDate,source}:null);
    const avg=Math.round(rows.reduce((s,r)=>s+r.value,0)/rows.length);
    setOce(avg);setRawOce(String(avg));
  }
  function nodeState(id){
    if(id===targetId)return'target';
    if(phase==='result'){
      if(revealedExcl.includes(id)&&currentExcluded.includes(id))return'excluded';
      if(!revealedExcl.includes(id)&&currentExcluded.includes(id))return'pending';
    }
    return'normal';
  }
  const nColor=s=>({target:C.gold,excluded:C.red,pending:C.muted,normal:C.accent}[s]||C.accent);
  const nFill =s=>({target:"rgba(255,209,102,0.18)",excluded:"rgba(255,79,109,0.18)",
    pending:"rgba(58,82,112,0.08)",normal:"rgba(0,200,255,0.06)"}[s]);
  function removeBidder(id){
    setBidders(p=>p.filter(b=>b.id!==id));
    setDragPos(p=>{const n={...p};delete n[id];return n;});
    if(targetId===id){setTargetId(null);setAnalysis(null);setPhase('idle');setRevealedExcl([]);}
  }
  function addBidder(){
    const v=parseFloat(newVal);if(!newName.trim()||isNaN(v))return;
    setBidders(p=>[...p,{id:uid(),name:newName.trim(),value:v}]);
    setNewName('');setNewVal('');setShowAdd(false);
    setTargetId(null);setAnalysis(null);setPhase('idle');setRevealedExcl([]);
  }
  function reset(){setTargetId(null);setAnalysis(null);setPhase('idle');setRevealedExcl([]);setSelectedCombo(0);setDragPos({});}
  function formatTLabel(result){
    if(!result)return'';
    if(Math.abs(result.tAtMin-result.tAtMax)<1e-9)return`T = ${result.tAtMin.toFixed(2)}`;
    return`T range = ${result.tAtMax.toFixed(2)} .. ${result.tAtMin.toFixed(2)}`;
  }

  function renderLines(){
    if(!targetId||!positions[targetId])return null;
    const tp=positions[targetId];
    return bidders.map(b=>{
      if(b.id===targetId)return null;
      const bp=positions[b.id];if(!bp)return null;
      const st=nodeState(b.id);
      return(<line key={b.id} x1={tp.x} y1={tp.y} x2={bp.x} y2={bp.y}
        stroke={st==='excluded'?C.red:st==='pending'?C.muted:C.accentDim}
        strokeWidth={st==='excluded'?2:1}
        strokeDasharray={st==='excluded'?'7,4':st==='pending'?'3,5':'none'}
        opacity={st==='excluded'?0.8:st==='pending'?0.2:0.3}
        style={{transition:'all 0.4s ease'}}/>);
    });
  }

  const targetBidder=bidders.find(b=>b.id===targetId);

  // ── RENDER ──────────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Courier New',monospace",
      color:C.text,display:"flex",flexDirection:"column",maxWidth:520,margin:"0 auto"}}>
      {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}

      {/* Header */}
      <div style={{padding:"12px 16px 8px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:4,color:C.accent}}>BID MIND MAP</div>
        {importMeta&&(
          <div style={{fontSize:10,color:C.gold,marginTop:2,letterSpacing:1}}>
            {importMeta.tenderId&&<span>ID: {importMeta.tenderId} &nbsp;</span>}
            {importMeta.openingDate&&<span>| {importMeta.openingDate}</span>}
          </div>
        )}
        <div style={{fontSize:10,color:C.textDim,marginTop:3,letterSpacing:1}}>
          {phase==='idle'?'DRAG A BIDDER → DROP ON CENTER':
           phase==='analyzing'?'⟳ COMPUTING...':
           `TARGET: ${targetBidder?.name||''} — TAP COMBO TO HIGHLIGHT`}
        </div>
      </div>

      {/* Params row */}
      <div style={{display:"flex",gap:6,padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1.15}}>
          <div style={{fontSize:10,color:C.textDim,marginBottom:2}}>OCE</div>
          <input value={rawOce} onChange={e=>{setRawOce(e.target.value);const v=parseFloat(e.target.value);if(!isNaN(v)&&v>0)setOce(v);}}
            style={{...iSty,marginTop:0,fontSize:12,padding:"6px 8px"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:C.textDim,marginBottom:2}}>NPPI MIN</div>
          <input value={rawCoeffMin} onChange={e=>{setRawCoeffMin(e.target.value);const v=parseFloat(e.target.value);if(!isNaN(v))setCoeffMin(v);}}
            style={{...iSty,marginTop:0,fontSize:12,padding:"6px 8px"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:C.textDim,marginBottom:2}}>NPPI MAX</div>
          <input value={rawCoeffMax} onChange={e=>{setRawCoeffMax(e.target.value);const v=parseFloat(e.target.value);if(!isNaN(v))setCoeffMax(v);}}
            style={{...iSty,marginTop:0,fontSize:12,padding:"6px 8px"}}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:4}}>
          <button onClick={()=>setShowImport(true)}
            style={bSty(C.accent,{padding:"6px 10px",fontSize:11,whiteSpace:"nowrap"})}>⬆ Import</button>
        </div>
      </div>

      {/* SVG canvas */}
      <div ref={containerRef} style={{width:"100%",flexShrink:0}}>
        <svg ref={svgRef} width={W} height={H}
          style={{display:"block",background:`radial-gradient(ellipse at 50% 50%,#0d1f35 0%,${C.bg} 75%)`}}
          onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
          onTouchMove={e=>{e.preventDefault();onDragMove(e);}}
          onTouchEnd={e=>{e.preventDefault();onDragEnd(e);}}
          >
          <defs>
            <radialGradient id="cg3">
              <stop offset="0%" stopColor={C.gold} stopOpacity="0.22"/>
              <stop offset="100%" stopColor={C.gold} stopOpacity="0"/>
            </radialGradient>
            <filter id="gl3">
              <feGaussianBlur stdDeviation="3" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Grid dots */}
          {Array.from({length:14},(_,row)=>Array.from({length:18},(_,col)=>(
            <circle key={`${row}-${col}`} cx={col*(W/17)+8} cy={row*(H/13)+8} r={0.7} fill={C.muted} opacity={0.18}/>
          )))}

          {/* Ring guides */}
          {layoutData.rings.map((ring,idx)=>(
            <circle key={`ring-${idx}`} cx={CX} cy={CY} r={ring.radius} fill="none"
              stroke={C.border} strokeWidth={0.5} opacity={targetId?0.4:0.25} strokeDasharray="4,8"/>
          ))}

          {/* Drop zone */}
          <circle cx={CX} cy={CY} r={dropR} fill="url(#cg3)"
            stroke={targetId?C.gold:C.accentDim} strokeWidth={targetId?2:1}
            strokeDasharray={targetId?"none":"5,4"} opacity={pulse?1:0.65}
            style={{transition:"all 0.3s"}}/>
          {!targetId&&<text x={CX} y={CY+5} textAnchor="middle" fill={C.textDim} fontSize={Math.round(10*scale)} letterSpacing={1}>DROP HERE</text>}

          {renderLines()}

          {/* Particles */}
          {particles.map(p=>{
            const rad=(p.angle*Math.PI)/180;
            return <circle key={p.id}
              cx={p.x+Math.cos(rad)*p.speed*28} cy={p.y+Math.sin(rad)*p.speed*28}
              r={p.size} fill={C.gold} opacity={0.7}
              style={{transition:"all 0.8s ease-out"}}/>;
          })}

          {/* Nodes */}
          {bidders.map(b=>{
            const pos=positions[b.id];if(!pos)return null;
            const {r=28}=pos;
            const st=nodeState(b.id);
            const color=nColor(st);
            const fill=nFill(st);
            const serial=bidderSerials[b.id];
            const maxC=r>=32?8:r>=24?6:r>=17?4:3;
            const dn=b.name.length>maxC?b.name.slice(0,maxC-1)+'…':b.name;
            const fs=r>=32?11:r>=24?10:r>=17?8:7;
            const serialFs=r>=32?9:r>=24?8:r>=17?7:6;
            const amountFs=r>=32?8:r>=24?7:6;
            const serialY=-r+Math.max(6,r*0.65);
            const nameY=r>=24?-2:r>=17?0:1;
            const statusFs=r>=24?7:6;
            return(
              <g key={b.id} transform={`translate(${pos.x},${pos.y})`}
                style={{cursor:"grab"}}
                onMouseDown={e=>onDragStart(e,b.id)}
                onTouchStart={e=>{e.preventDefault();onDragStart(e,b.id);}}>
                {st==='excluded'&&<circle r={r+10} fill="none" stroke={C.red} strokeWidth={1.5}
                  opacity={0.35} style={{animation:"pRing 1.2s ease-in-out infinite"}}/>}
                {st==='target'&&<circle r={r+7} fill="none" stroke={C.gold} strokeWidth={1}
                  opacity={0.4} strokeDasharray="6,4"/>}
                <circle r={r} fill={fill} stroke={color}
                  strokeWidth={st==='target'?2.5:st==='excluded'?2:1.5}
                  filter={st!=='normal'&&st!=='pending'?"url(#gl3)":"none"}
                  style={{transition:"all 0.4s ease"}}/>
                {st==='excluded'&&<line x1={-r+6} y1={-r+6} x2={r-6} y2={r-6}
                  stroke={C.red} strokeWidth={1.8} opacity={0.8}/>}
                <text y={serialY} textAnchor="middle" fill={color} fontSize={serialFs} fontWeight={700} opacity={0.9}>
                  {serial}
                </text>
                <text y={nameY} textAnchor="middle" fill={color} fontSize={fs} fontWeight={700}>{dn}</text>
                {r>=24&&<text y={Math.min(r-6,10)} textAnchor="middle" fill={color} fontSize={amountFs} opacity={0.7}>
                  {b.value>=1e6?(b.value/1e6).toFixed(1)+'M':b.value.toLocaleString()}
                </text>}
                {st!=='normal'&&<text y={r-3} textAnchor="middle" fill={color} fontSize={statusFs} opacity={0.85} letterSpacing={1}>
                  {st==='target'?'TARGET':st==='excluded'?'EXCL':'...'}
                </text>}
              </g>
            );
          })}

          {phase==='analyzing'&&targetId&&positions[targetId]&&(
            <circle cx={positions[targetId].x} cy={positions[targetId].y} r={dropR+12}
              fill="none" stroke={C.gold} strokeWidth={2} opacity={0.6} strokeDasharray="28,10"
              style={{transformOrigin:`${positions[targetId].x}px ${positions[targetId].y}px`,
                animation:"spin 1.5s linear infinite"}}/>
          )}
        </svg>
        <style>{`
          @keyframes pRing{0%,100%{opacity:0.15}50%{opacity:0.5}}
          @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        `}</style>
      </div>

      {/* Bottom tabs */}
      <div style={{display:"flex",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}}>
        {['bidders','results'].map(p=>(
          <button key={p} onClick={()=>setShowPanel(p)}
            style={{flex:1,padding:"10px",fontSize:12,background:showPanel===p?`${C.accent}18`:"transparent",
              border:"none",color:showPanel===p?C.accent:C.textDim,cursor:"pointer",
              borderBottom:showPanel===p?`2px solid ${C.accent}`:"2px solid transparent",
              fontFamily:"'Courier New',monospace",letterSpacing:1}}>
            {p==='bidders'?`BIDDERS (${bidders.length})`:`RESULTS${analysis?.results?.length?` (${analysis.results.length})`:''}` }
          </button>
        ))}
      </div>

      {/* Bottom panel: Bidders */}
      {showPanel==='bidders'&&(
        <div style={{padding:"12px",display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {bidders.map(b=>{
            const st=nodeState(b.id);
            const col=st==='excluded'?C.red:st==='target'?C.gold:C.text;
            return(
              <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"8px 12px",borderRadius:8,
                background:st==='excluded'?"rgba(255,79,109,0.07)":st==='target'?"rgba(255,209,102,0.07)":"rgba(255,255,255,0.02)",
                border:`1px solid ${col}33`,transition:"all 0.3s"}}>
                <span style={{color:col,fontSize:13}}>{b.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:C.textDim,fontSize:12}}>{b.value>=1e6?(b.value/1e6).toFixed(3)+'M':b.value.toLocaleString()}</span>
                  <span onClick={()=>removeBidder(b.id)} style={{color:C.red,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</span>
                </div>
              </div>
            );
          })}
          {showAdd?(
            <div style={{display:"flex",flexDirection:"column",gap:8,padding:"8px",
              background:"rgba(255,255,255,0.02)",border:`1px solid ${C.border}`,borderRadius:8}}>
              <input placeholder="Bidder name" value={newName} onChange={e=>setNewName(e.target.value)} style={iSty}/>
              <input placeholder="Bid amount" value={newVal} onChange={e=>setNewVal(e.target.value)}
                type="number" style={iSty} onKeyDown={e=>e.key==='Enter'&&addBidder()}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addBidder} style={bSty(C.green,{flex:1,padding:"10px"})}>✓ Add</button>
                <button onClick={()=>setShowAdd(false)} style={bSty(C.muted,{flex:1,padding:"10px"})}>Cancel</button>
              </div>
            </div>
          ):(
            <button onClick={()=>setShowAdd(true)}
              style={bSty(C.accentDim,{padding:"10px",fontSize:13})}>+ Add Bidder</button>
          )}
        </div>
      )}

      {/* Bottom panel: Results */}
      {showPanel==='results'&&(
        <div style={{padding:"12px",display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {phase==='idle'&&(
            <div style={{color:C.textDim,fontSize:13,lineHeight:1.7,padding:8}}>
              Drag a bidder node onto the center circle to analyze winning combinations.
            </div>
          )}
          {phase==='analyzing'&&(
            <div style={{color:C.accent,fontSize:14,padding:8}}>⟳ Computing combinations...</div>
          )}
          {phase==='result'&&analysis&&(
            <>
              {analysis.error?(
                <div style={{color:C.red,fontSize:13,padding:"10px 14px",
                  background:"rgba(255,79,109,0.08)",border:`1px solid ${C.red}44`,borderRadius:10}}>
                  Error: {analysis.error}
                </div>
              ):analysis.isAlreadyWinner?(
                <div style={{color:C.green,fontSize:13,padding:"10px 14px",
                  background:"rgba(6,214,160,0.08)",border:`1px solid ${C.green}44`,borderRadius:10}}>
                  {targetBidder?.name} already wins with all bidders included
                  {analysis.coeffMin===analysis.coeffMax?'!':` across NPPI ${analysis.coeffMin.toFixed(2)}-${analysis.coeffMax.toFixed(2)}!`}
                </div>
              ):!analysis.results?.length?(
                <div style={{color:C.red,fontSize:13,padding:8}}>✗ No valid exclusion combination found.</div>
              ):(
                <>
                  {/* Active combo summary */}
                  {analysis.results[selectedCombo]&&(
                    <div style={{padding:"12px",background:"rgba(255,209,102,0.07)",
                      border:`1px solid ${C.gold}55`,borderRadius:10}}>
                      <div style={{fontSize:11,color:C.textDim,marginBottom:6,letterSpacing:1}}>ACTIVE COMBO #{selectedCombo+1}</div>
                      <div style={{fontSize:13,color:C.gold,marginBottom:4}}>
                        Minimum exclusions required: {analysis.foundMin}
                      </div>
                      <div style={{fontSize:12,color:C.gold,marginBottom:4}}>
                        Exclude {analysis.results[selectedCombo].k} bidder{analysis.results[selectedCombo].k!==1?'s':''}
                      </div>
                      <div style={{fontSize:12,color:C.red,marginBottom:4}}>
                        ✕ {analysis.results[selectedCombo].excluded.map(eid=>bidders.find(b=>b.id===eid)?.name||'?').join(', ')}
                      </div>
                      <div style={{fontSize:11,color:C.textDim}}>
                        {formatTLabel(analysis.results[selectedCombo])} &nbsp;|&nbsp;
                        Target: {targetBidder?.name} ({targetBidder?.value.toLocaleString()})
                      </div>
                    </div>
                  )}

                  <div style={{fontSize:11,color:C.textDim,letterSpacing:1,padding:"4px 2px"}}>
                    {analysis.results.length} COMBINATION{analysis.results.length!==1?'S':''} — TAP TO HIGHLIGHT ON MAP
                  </div>
                  {analysis.truncated&&(
                    <div style={{fontSize:11,color:C.gold,padding:"2px 2px"}}>
                      Result capped at {MAX_RESULTS}; more combinations may exist.
                    </div>
                  )}

                  {analysis.results.map((r,i)=>{
                    const excNames=r.excluded.map(eid=>bidders.find(b=>b.id===eid)?.name||'?').join(', ')||'none';
                    const isActive=i===selectedCombo;
                    return(
                      <div key={i} onClick={()=>setSelectedCombo(i)}
                        style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",
                          background:isActive?"rgba(255,209,102,0.1)":"rgba(255,255,255,0.02)",
                          border:`2px solid ${isActive?C.gold+'88':C.border}`,
                          transition:"all 0.2s",WebkitTapHighlightColor:"transparent"}}>
                        <div style={{fontSize:12,color:isActive?C.gold:C.textDim,fontWeight:isActive?700:400,marginBottom:3}}>
                          #{i+1} — Exclude {r.k} bidder{r.k!==1?'s':''}
                        </div>
                        <div style={{fontSize:12,color:isActive?C.red:C.muted,marginBottom:3}}>✕ {excNames}</div>
                        <div style={{fontSize:11,color:C.textDim}}>{formatTLabel(r)}</div>
                      </div>
                    );
                  })}

                  <button onClick={reset}
                    style={bSty(C.muted,{padding:"10px",fontSize:13,marginTop:4})}>↺ Reset</button>
                </>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
